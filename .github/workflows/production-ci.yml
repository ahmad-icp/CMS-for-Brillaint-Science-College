name: Production CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff
      - name: Compile backend
        run: python -m compileall -q backend/app
      - name: Verify canonical ORM registration
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
        run: python -c "import app.db.models; from app.db.base import Base; names=list(Base.metadata.tables); assert len(names)==len(set(names)); print(f'{len(names)} tables registered')"
      - name: Run backend tests
        id: pytest
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
        run: |
          set +e
          pytest -q > pytest.log 2>&1
          code=$?
          cat pytest.log
          exit $code
      - name: Upload pytest log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-log
          path: pytest.log
          if-no-files-found: ignore
      - name: Check critical Python errors
        run: ruff check backend/app tests --select E9,F63,F7,F82

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t cep-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t cep-frontend:test .
