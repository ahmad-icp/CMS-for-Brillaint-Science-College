name: Production CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  security-events: write

concurrency:
  group: production-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies and quality tools
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff pytest-cov pip-audit bandit
          pip check
      - name: Compile backend
        run: python -m compileall -q backend/app
      - name: Verify canonical ORM registration
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
        run: python -c "import app.db.models; from app.db.base import Base; names=list(Base.metadata.tables); assert len(names)==len(set(names)); print(f'{len(names)} tables registered')"
      - name: Validate fresh database migration
        working-directory: backend
        env:
          PYTHONPATH: .
          ENVIRONMENT: test
          DATABASE_URL: sqlite+pysqlite:///migration-smoke.db
        run: |
          alembic upgrade head
          alembic current
          rm -f migration-smoke.db
      - name: Run backend tests with coverage
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
        run: |
          set +e
          pytest -q --cov=backend/app --cov-report=term-missing --cov-report=xml:coverage.xml > pytest.log 2>&1
          code=$?
          cat pytest.log
          exit $code
      - name: Check Python correctness
        run: ruff check backend/app tests --select E9,F63,F7,F82
      - name: Audit Python runtime requirements
        run: |
          set +e
          pip-audit -r backend/requirements.txt --strict > pip-audit.log 2>&1
          code=$?
          cat pip-audit.log
          exit $code
      - name: Scan backend for high-confidence security defects
        run: bandit -r backend/app -lll -iii --exclude backend/alembic
      - name: Upload backend quality reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-quality-reports
          path: |
            pytest.log
            coverage.xml
            pip-audit.log
          if-no-files-found: ignore

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Verify production bundle
        run: npm run test:build
      - name: Audit production dependencies
        run: npm audit --omit=dev --audit-level=high

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Validate production Compose
        run: |
          cp .env.production.example .env.production
          docker compose -f docker-compose.production.yml --env-file .env.production config --quiet
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t cep-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t cep-frontend:test .
      - name: Scan backend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cep-backend:test
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
      - name: Scan frontend image
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: cep-frontend:test
          format: table
          exit-code: "1"
          ignore-unfixed: true
          severity: CRITICAL
