name: Production CI

on:
  push:
    branches: [main, "fix/**"]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: production-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install ruff mypy
      - name: Compile backend
        run: python -m compileall -q backend/app
      - name: Verify canonical ORM registration
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
        run: python -c "import app.db.models; from app.db.base import Base; assert len(Base.metadata.tables) == len(set(Base.metadata.tables)); print(f'{len(Base.metadata.tables)} tables registered')"
      - name: Lint backend
        run: ruff check backend/app tests
      - name: Run backend tests
        env:
          PYTHONPATH: backend
          ENVIRONMENT: test
        run: pytest -q

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t cep-backend:test .
      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t cep-frontend:test .
