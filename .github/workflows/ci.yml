name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  backend:
    name: Backend lint, typecheck, tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: cep_test
          POSTGRES_USER: cep
          POSTGRES_PASSWORD: cep_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U cep -d cep_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      ENVIRONMENT: test
      DATABASE_URL: postgresql+psycopg://cep:cep_test@localhost:5432/cep_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret-key-with-at-least-32-bytes
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install backend dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r backend/requirements.txt
      - name: Lint backend
        run: ruff check backend tests
      - name: Type-check backend
        run: mypy backend/app
      - name: Run backend tests
        run: PYTHONPATH=backend pytest -q

  frontend:
    name: Frontend typecheck and build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        run: npm ci
      - name: Type-check frontend
        run: npm run typecheck
      - name: Build frontend
        run: npm run build

  docker:
    name: Docker image build
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Build backend image
        run: docker build -f docker/backend/Dockerfile -t cep-backend:ci .
      - name: Build frontend image
        run: docker build -f docker/frontend/Dockerfile -t cep-frontend:ci .
